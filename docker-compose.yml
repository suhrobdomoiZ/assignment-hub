version: '3.8'

services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: postgres
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: secret
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql

  backend:
    build: .
    platform: linux/amd64
    ports:
      - "8080:8080"
    environment:
      spring_datasource_url: jdbc:postgresql://db:5432/postgres

volumes:
  pgdata:
